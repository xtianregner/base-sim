[variables]
NIXPACKS_PYTHON_VERSION = "3.10"

[phases.setup]
nixPkgs = ["python310", "gcc"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
  "cd src && python manage.py collectstatic --noinput",
  "cd src && python manage.py migrate"
]

[start]
cmd = "cd src && gunicorn myproject.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
